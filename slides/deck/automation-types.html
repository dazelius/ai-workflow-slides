<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>자동화의 종류</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker"><br></div>
<p class="title-lg">자동화에도 <span class="accent">종류</span>가 있다</p>
<div class="top-stage">
  <p class="body-lg" style="margin-top:1.2vw; opacity:0.65; font-size:1vw; text-align:center;"><br></p>
</div>
<div class="page-number" id="page-number">10 / 76</div>

<script>
(function(){
  var slideEl = document.currentScript ? document.currentScript.closest('.slide') : null;
  if(!slideEl) return;
  var cards = slideEl.querySelectorAll('.card-grid .card');
  cards.forEach(function(card){
    card.style.cursor = 'pointer';
    card.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
    card.addEventListener('click', function(){
      var isMarked = card.classList.contains('marked');
      cards.forEach(function(c){ c.classList.remove('marked'); c.style.opacity = '1'; c.style.transform = 'none'; });
      if(!isMarked){
        card.classList.add('marked');
        card.style.transform = 'translateY(-0.3vw)';
        cards.forEach(function(c){
          if(c !== card){ c.style.opacity = '0.55'; }
        });
      }
    });
  });
})();
</script><div class="free-el free-el--image" contenteditable="false" style="position: absolute; left: 18.6534%; top: 24.0135%; width: 61.7845%; z-index: 10; opacity: 1; border-radius: 0px; background: transparent;"><img src="../assets/img/img-aec8b7a4ebe4.png" draggable="false" style="border-radius: 0px;"></div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>

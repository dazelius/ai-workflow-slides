<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>A. 워크플로우 설계 — 답변</title>
<link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
<div class="slide">
  <div class="kicker alt">답변 · A</div>
  <p class="title-lg">자동화 워크플로우 설계</p>
  <div class="col" style="margin-top:2.2vw; gap:1.6vw;">
    <div class="framework-step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">반복성부터 자동화하라</div>
        <div class="step-desc">매주 반복되는 작업(파일 정리, 데이터 변환, 리포트 생성)이 자동화 최우선 후보입니다.</div>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">파괴적 작업은 3단계 게이트로</div>
        <div class="step-desc">미리보기(dry-run) → 승인 → 실행을 스크립트/규칙으로 강제해 되돌릴 수 없는 실수를 원천 차단합니다.</div>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">규칙은 말이 아니라 파일로 고정하라</div>
        <div class="step-desc">CLAUDE.md / 프로젝트별 설정 파일에 명명 규칙·폴더 구조·컨텍스트를 문서화하면 매번 설명할 필요가 없어집니다.</div>
      </div>
    </div>
  </div>
  <div class="page-number" id="page-number"></div>
</div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>

<title>C. 밸런싱·데이터 — 답변</title>
<link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
<div class="slide">
  <div class="kicker alt">답변 · C</div>
  <p class="title-lg">밸런싱 & 데이터 작업</p>
  <div class="col" style="margin-top:2vw; gap:1.5vw;">
    <div class="framework-step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">데이터와 '의도'를 함께 전달하라</div>
        <div class="step-desc">수치 테이블만이 아니라 "이 수치가 지키려는 의도·제약"을 같이 주면 연쇄 영향 검토 품질이 크게 올라갑니다.</div>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">AI는 가설 생성기, 사람은 최종 검증자</div>
        <div class="step-desc">특히 조작감·액션 개입이 있는 수치는 반드시 실제 플레이로 검증해야 합니다.</div>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">JSON/YAML + 스크립트가 엑셀보다 유리한 지점</div>
        <div class="step-desc">버전 관리와 AI의 직접 읽기/쓰기에 유리합니다. 단, 사람이 검토할 뷰(시트)는 별도로 유지하는 게 실용적입니다.</div>
      </div>
    </div>
  </div>
  <div class="page-number" id="page-number"></div>
</div>

&lt;div class=&quot;wrap&quot;&gt;
  &lt;div class=&quot;header&quot;&gt;

    &lt;button id=&quot;autoPlaceBtn&quot;&gt;⚙️ 자동 배치&lt;/button&gt;
    &lt;label&gt;밀도
      &lt;input type=&quot;range&quot; id=&quot;densitySlider&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;5&quot;&gt;
    &lt;/label&gt;
    &lt;div class=&quot;toggle-wrap&quot;&gt;
      &lt;button id=&quot;tuneBtn&quot; class=&quot;secondary&quot;&gt;🖐️ 사람 튜닝 모드&lt;/button&gt;
    &lt;/div&gt;

    &lt;span&gt;&lt;span class=&quot;sq&quot; style=&quot;background:#5fd97a;&quot;&gt;&lt;/span&gt;오브젝트&lt;/span&gt;

  &lt;div class=&quot;footer&quot;&gt;방향키/버튼 없이 마우스만 사용 · 튜닝 모드에서 아이콘을 드래그해 위치 조정&lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
(function(){
  const COLS = 20, ROWS = 12;
  const canvas = document.getElementById('mapCanvas');
  const ctx = canvas.getContext('2d');
  const genMapBtn = document.getElementById('genMapBtn');
  const autoPlaceBtn = document.getElementById('autoPlaceBtn');
  const densitySlider = document.getElementById('densitySlider');
  const tuneBtn = document.getElementById('tuneBtn');

  // tile types: 0 grass(open), 1 wall, 2 water
  let grid = [];
  let entities = []; // {type:'monster'|'object', x, y (grid float coords)}
  let tuningMode = false;
  let dragging = null;

  let cellSize = 32;

  function resizeCanvas(){
    const stage = canvas.parentElement;
    const availW = stage.clientWidth;
    const availH = stage.clientHeight;
    const ratio = COLS / ROWS;
    let w = availW, h = w / ratio;
    if (h &gt; availH) { h = availH; w = h * ratio; }
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cellSize = w / COLS;
    draw();
  }

  function generateMap(){
    grid = [];
    for (let y = 0; y &lt; ROWS; y++){
      const row = [];
      for (let x = 0; x &lt; COLS; x++){
        row.push(0);
      }
      grid.push(row);
    }
    // scatter wall clusters
    const wallClusters = 5 + Math.floor(Math.random()*4);
    for (let c = 0; c &lt; wallClusters; c++){
      let cx = Math.floor(Math.random()*COLS);
      let cy = Math.floor(Math.random()*ROWS);
      const len = 2 + Math.floor(Math.random()*4);
      for (let i=0;i&lt;len;i++){
        if (cx&gt;=0&amp;&amp;cx&lt;COLS&amp;&amp;cy&gt;=0&amp;&amp;cy&lt;ROWS) grid[cy][cx] = 1;
        cx += Math.floor(Math.random()*3)-1;
        cy += Math.floor(Math.random()*3)-1;
      }
    }
    // scatter water clusters
    const waterClusters = 3 + Math.floor(Math.random()*3);
    for (let c = 0; c &lt; waterClusters; c++){
      let cx = Math.floor(Math.random()*COLS);
      let cy = Math.floor(Math.random()*ROWS);
      const len = 2 + Math.floor(Math.random()*5);
      for (let i=0;i&lt;len;i++){
        if (cx&gt;=0&amp;&amp;cx&lt;COLS&amp;&amp;cy&gt;=0&amp;&amp;cy&lt;ROWS &amp;&amp; grid[cy][cx] === 0) grid[cy][cx] = 2;
        cx += Math.floor(Math.random()*3)-1;
        cy += Math.floor(Math.random()*3)-1;
      }
    }
    // border walls
    for (let x=0;x&lt;COLS;x++){ grid[0][x]=1; grid[ROWS-1][x]=1; }
    for (let y=0;y&lt;ROWS;y++){ grid[y][0]=1; grid[y][COLS-1]=1; }

    entities = [];
    draw();
  }

  function isWallNear(x, y, dist){
    for (let dy=-dist; dy&lt;=dist; dy++){
      for (let dx=-dist; dx&lt;=dist; dx++){
        const nx = x+dx, ny = y+dy;
        if (nx&lt;0||nx&gt;=COLS||ny&lt;0||ny&gt;=ROWS) continue;
        if (grid[ny][nx] === 1) return true;
      }
    }
    return false;
  }

  function isOpen(x,y){
    return grid[y] &amp;&amp; grid[y][x] === 0;
  }

  function dist2(a,b){
    return Math.hypot(a.x-b.x, a.y-b.y);
  }

  function autoPlace(){
    entities = [];
    const density = parseInt(densitySlider.value, 10);
    const targetCount = Math.round(6 + density * 2.4); // total entities
    const minGap = 2.2; // grid units minimum distance between entities
    const wallBuffer = 1; // avoid tiles within this range of wall

    // gather candidate open cells not near walls
    let candidates = [];
    for (let y=1;y&lt;ROWS-1;y++){
      for (let x=1;x&lt;COLS-1;x++){
        if (isOpen(x,y) &amp;&amp; !isWallNear(x,y,wallBuffer)){
          candidates.push({x:x+0.5, y:y+0.5});
        }
      }
    }
    // shuffle candidates
    for (let i=candidates.length-1;i&gt;0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [candidates[i],candidates[j]] = [candidates[j],candidates[i]];
    }

    let placed = 0;
    let attempts = 0;
    while (placed &lt; targetCount &amp;&amp; attempts &lt; candidates.length){
      const c = candidates[attempts];
      attempts++;
      const tooClose = entities.some(e =&gt; dist2(e, c) &lt; minGap);
      if (tooClose) continue;
      const type = (placed % 3 === 0) ? 'object' : 'monster'; // roughly 1/3 objects
      entities.push({ type, x: c.x, y: c.y });
      placed++;
    }
    draw();
  }

  function draw(){
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);

    const cw = w / COLS;
    const ch = h / ROWS;

    for (let y=0;y&lt;ROWS;y++){
      for (let x=0;x&lt;COLS;x++){
        const t = grid[y][x];
        let color = '#3a6b3a';
        if (t === 1) color = '#54525a';
        else if (t === 2) color = '#2e5566';
        ctx.fillStyle = color;
        ctx.fillRect(x*cw, y*ch, cw+0.5, ch+0.5);
      }
    }

    // subtle grid lines
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    for (let x=0;x&lt;=COLS;x++){
      ctx.beginPath();
      ctx.moveTo(x*cw, 0);
      ctx.lineTo(x*cw, h);
      ctx.stroke();
    }
    for (let y=0;y&lt;=ROWS;y++){
      ctx.beginPath();
      ctx.moveTo(0, y*ch);
      ctx.lineTo(w, y*ch);
      ctx.stroke();
    }

    // entities
    entities.forEach(e =&gt; {
      const px = e.x * cw;
      const py = e.y * ch;
      if (e.type === 'monster'){
        ctx.beginPath();
        ctx.arc(px, py, Math.min(cw,ch)*0.28, 0, Math.PI*2);
        ctx.fillStyle = '#ff5c4d';
        ctx.fill();
        ctx.strokeStyle = '#ffd8d2';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      } else {
        const s = Math.min(cw,ch)*0.42;
        ctx.fillStyle = '#5fd97a';
        ctx.fillRect(px - s/2, py - s/2, s, s);
        ctx.strokeStyle = '#d7ffe0';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(px - s/2, py - s/2, s, s);
      }
    });

    if (tuningMode){
      ctx.strokeStyle = '#ff6b4a';
      ctx.lineWidth = 3;
      ctx.strokeRect(1.5,1.5,w-3,h-3);
    }
  }

  function getMousePos(evt){
    const rect = canvas.getBoundingClientRect();
    const cw = canvas.clientWidth / COLS;
    const ch = canvas.clientHeight / ROWS;
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    const x = (clientX - rect.left) / cw;
    const y = (clientY - rect.top) / ch;
    return {x, y};
  }

  function findEntityAt(pos){
    let closest = null;
    let minD = 0.55;
    entities.forEach(e =&gt; {
      const d = dist2(e, pos);
      if (d &lt; minD){ minD = d; closest = e; }
    });
    return closest;
  }

  canvas.addEventListener('mousedown', (e) =&gt; {
    if (!tuningMode) return;
    const pos = getMousePos(e);
    const ent = findEntityAt(pos);
    if (ent){
      dragging = ent;
      canvas.style.cursor = 'grabbing';
    }
  });
  window.addEventListener('mousemove', (e) =&gt; {
    if (!dragging) return;
    const pos = getMousePos(e);
    dragging.x = Math.min(Math.max(pos.x, 0.5), COLS-0.5);
    dragging.y = Math.min(Math.max(pos.y, 0.5), ROWS-0.5);
    draw();
  });
  window.addEventListener('mouseup', () =&gt; {
    if (dragging){
      dragging = null;
      canvas.style.cursor = 'grab';
    }
  });

  // touch support
  canvas.addEventListener('touchstart', (e) =&gt; {
    if (!tuningMode) return;
    const pos = getMousePos(e);
    const ent = findEntityAt(pos);
    if (ent){ dragging = ent; e.preventDefault(); }
  }, {passive:false});
  canvas.addEventListener('touchmove', (e) =&gt; {
    if (!dragging) return;
    const pos = getMousePos(e);
    dragging.x = Math.min(Math.max(pos.x, 0.5), COLS-0.5);
    dragging.y = Math.min(Math.max(pos.y, 0.5), ROWS-0.5);
    draw();
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', () =&gt; { dragging = null; });

  tuneBtn.addEventListener('click', () =&gt; {
    tuningMode = !tuningMode;
    tuneBtn.classList.toggle('active', tuningMode);
    canvas.classList.toggle('tuning', tuningMode);
    draw();
  });

  genMapBtn.addEventListener('click', generateMap);
  autoPlaceBtn.addEventListener('click', autoPlace);

  window.addEventListener('resize', resizeCanvas);

  generateMap();
  resizeCanvas();
  autoPlace();
})();
&lt;/script&gt;

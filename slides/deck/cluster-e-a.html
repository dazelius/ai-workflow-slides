<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>E. 모델·창의성 — 답변</title>
<link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
<div class="slide">
  <div class="kicker alt">답변 · E</div>
  <p class="title-lg">모델 선택 & 창의성의 한계</p>
  <div class="col" style="margin-top:2vw; gap:1.5vw;">
    <div class="framework-step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">모델은 '용도별'로 다르게 쓴다</div>
        <div class="step-desc">구조화된 문서는 추론에 강한 모델, 발산적 아이디어는 창작에 강한 모델 — 본인 업무로 직접 비교해보는 것이 가장 정확합니다.</div>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">혼합 사용이 유리한 경우가 많다</div>
        <div class="step-desc">초안은 A모델, 다듬기·비평은 B모델처럼 역할을 분리하면 결과물의 완성도가 올라갑니다.</div>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">창의성 문제는 프롬프트가 아니라 '제약'의 문제</div>
        <div class="step-desc">막연히 "다양하게"보다 강한 제약(금지어, 낯선 조합 강제)을 줄 때 진짜 새로운 결과가 나옵니다.</div>
      </div>
    </div>
  </div>
  <div class="page-number" id="page-number"></div>
</div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>
</body>
</html>

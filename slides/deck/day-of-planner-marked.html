<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>자동화 대상 표시</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker">진짜 일 · 03</div>
<p class="title-lg">고객 경험에 더 많은 시간을 할애하자</p>
<div class="top-stage">
  <div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
    <!-- 중앙 원형 차트 영역 -->
    <svg viewBox="0 0 400 400" style="width:30vw; height:30vw; transform:rotate(-90deg); filter:drop-shadow(0 0 2vw rgba(255,107,74,0.3));">
      <!-- 배경 원 (더 진한 배경) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="44"></circle>
      
      <!-- 세그먼트들 (각 업무별 비율) -->
      <!-- 문서 작성 15% -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(100,180,255,0.4)" stroke-width="44" stroke-dasharray="132 880" stroke-dashoffset="0" opacity="0.8"></circle>
      <!-- 테스트 25% (포인트) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#ff6b4a" stroke-width="44" stroke-dasharray="220 880" stroke-dashoffset="-132" opacity="1" style="filter:drop-shadow(0 0 0.8vw #ff6b4a);"></circle>
      <!-- 데이터 작업 20% (포인트) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#ff8c42" stroke-width="44" stroke-dasharray="176 880" stroke-dashoffset="-352" opacity="1" style="filter:drop-shadow(0 0 0.8vw #ff8c42);"></circle>
      <!-- 회의 18% -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(150,150,255,0.4)" stroke-width="44" stroke-dasharray="158 880" stroke-dashoffset="-528" opacity="0.8"></circle>
      <!-- 업무 관리 12% -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(100,200,150,0.4)" stroke-width="44" stroke-dasharray="106 880" stroke-dashoffset="-686" opacity="0.8"></circle>
      <!-- 피드백 10% (포인트) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#ffaa33" stroke-width="44" stroke-dasharray="88 880" stroke-dashoffset="-792" opacity="1" style="filter:drop-shadow(0 0 0.6vw #ffaa33);"></circle>
      
      <!-- 내부 그림자 효과 원 -->
      <circle cx="200" cy="200" r="95" fill="rgba(0,0,0,0.3)" stroke="rgba(255,107,74,0.15)" stroke-width="2"></circle>
      
      <!-- 중앙 텍스트 -->
      <text x="200" y="185" text-anchor="middle" fill="#ffffff" font-size="56" font-weight="800" transform="rotate(90 200 200)" style="text-shadow:0 0 1.5vw rgba(255,107,74,0.6);">60%</text>
      <text x="200" y="225" text-anchor="middle" fill="#ff6b4a" font-size="22" font-weight="600" transform="rotate(90 200 200)">간접 업무</text>
    </svg>

    <!-- 라벨들 (절대 배치) - 강화된 디자인 -->
    <div style="position:absolute; left:6%; top:24%; padding:0.6vw 1vw; background:rgba(100,180,255,0.12); border-left:0.25vw solid rgba(100,180,255,0.6); border-radius:0.3vw;">
      <div style="font-size:0.85vw; color:rgba(100,180,255,0.9); font-weight:600; margin-bottom:0.3vw;">01. 문서 작성</div>
      <div style="font-size:1.6vw; font-weight:800; color:#64b4ff;">15%</div>
    </div>
    
    <div style="position:absolute; right:6%; top:16%; padding:0.6vw 1vw; background:rgba(255,107,74,0.15); border-left:0.25vw solid #ff6b4a; border-radius:0.3vw; box-shadow:0 0 1.5vw rgba(255,107,74,0.3);">
      <div style="font-size:0.85vw; color:#ff6b4a; font-weight:600; margin-bottom:0.3vw;">02. 테스트</div>
      <div style="font-size:1.6vw; font-weight:800; color:#ff6b4a;">25%</div>
    </div>
    
    <div style="position:absolute; right:5%; bottom:30%; padding:0.6vw 1vw; background:rgba(255,140,66,0.15); border-left:0.25vw solid #ff8c42; border-radius:0.3vw; box-shadow:0 0 1.5vw rgba(255,140,66,0.3);">
      <div style="font-size:0.85vw; color:#ff8c42; font-weight:600; margin-bottom:0.3vw;">03. 데이터 작업</div>
      <div style="font-size:1.6vw; font-weight:800; color:#ff8c42;">20%</div>
    </div>
    
    <div style="position:absolute; right:8%; bottom:16%; padding:0.6vw 1vw; background:rgba(150,150,255,0.12); border-left:0.25vw solid rgba(150,150,255,0.6); border-radius:0.3vw;">
      <div style="font-size:0.85vw; color:rgba(150,150,255,0.9); font-weight:600; margin-bottom:0.3vw;">04. 회의</div>
      <div style="font-size:1.6vw; font-weight:800; color:#9696ff;">18%</div>
    </div>
    
    <div style="position:absolute; left:8%; bottom:16%; padding:0.6vw 1vw; background:rgba(100,200,150,0.12); border-left:0.25vw solid rgba(100,200,150,0.6); border-radius:0.3vw;">
      <div style="font-size:0.85vw; color:rgba(100,200,150,0.9); font-weight:600; margin-bottom:0.3vw;">05. 업무 관리</div>
      <div style="font-size:1.6vw; font-weight:800; color:#64c896;">12%</div>
    </div>
    
    <div style="position:absolute; left:6%; bottom:30%; padding:0.6vw 1vw; background:rgba(255,170,51,0.15); border-left:0.25vw solid #ffaa33; border-radius:0.3vw; box-shadow:0 0 1.5vw rgba(255,170,51,0.3);">
      <div style="font-size:0.85vw; color:#ffaa33; font-weight:600; margin-bottom:0.3vw;">06. 피드백</div>
      <div style="font-size:1.6vw; font-weight:800; color:#ffaa33;">10%</div>
    </div>

    <!-- 포인트 도트들 (강화된 글로우) -->
    <div style="position:absolute; right:23%; top:20%; width:0.8vw; height:0.8vw; border-radius:50%; background:#ff6b4a; box-shadow:0 0 1.8vw #ff6b4a, 0 0 0.4vw #fff;"></div>
    <div style="position:absolute; right:18%; bottom:34%; width:0.8vw; height:0.8vw; border-radius:50%; background:#ff8c42; box-shadow:0 0 1.8vw #ff8c42, 0 0 0.4vw #fff;"></div>
    <div style="position:absolute; left:18%; bottom:34%; width:0.8vw; height:0.8vw; border-radius:50%; background:#ffaa33; box-shadow:0 0 1.8vw #ffaa33, 0 0 0.4vw #fff;"></div>
    
    <!-- 연결선들 -->
    <svg style="position:absolute; width:100%; height:100%; pointer-events:none;">
      <line x1="77%" y1="20%" x2="70%" y2="25%" stroke="#ff6b4a" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"></line>
      <line x1="82%" y1="66%" x2="75%" y2="60%" stroke="#ff8c42" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"></line>
      <line x1="18%" y1="66%" x2="25%" y2="60%" stroke="#ffaa33" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"></line>
    </svg>
  </div>
</div>
<p class="body-lg" style="max-width:100%; text-align:center; margin: 2vw auto 0; font-size:1.4vw; line-height:1.7; font-weight:500;">
  고객이 실제로 경험하는 것에<br>
  <span style="color:#ff6b4a; font-weight:800; font-size:1.5vw; text-shadow:0 0 1vw rgba(255,107,74,0.4);">더 많은 시간</span>을 할애해야 하지 않을까?
</p>
<div class="page-number" id="page-number">19 / 67</div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>

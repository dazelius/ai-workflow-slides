<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>자동화 대상 표시</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker">진짜 일 · 03</div>
<p class="title-lg">고객 경험에 더 많은 시간을 할애하자</p>
<div class="top-stage">
  <div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
    <!-- 중앙 원형 차트 영역 -->
    <svg viewBox="0 0 400 400" style="width:28vw; height:28vw; transform:rotate(-90deg);">
      <!-- 배경 원 -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="40"></circle>
      
      <!-- 세그먼트들 (각 업무별 비율) -->
      <!-- 문서 작성 15% -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="40" stroke-dasharray="132 880" stroke-dashoffset="0" opacity="0.6"></circle>
      <!-- 테스트 25% (포인트) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#ff6b4a" stroke-width="40" stroke-dasharray="220 880" stroke-dashoffset="-132" opacity="0.9"></circle>
      <!-- 데이터 작업 20% (포인트) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#ff6b4a" stroke-width="40" stroke-dasharray="176 880" stroke-dashoffset="-352" opacity="0.7"></circle>
      <!-- 회의 18% -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="40" stroke-dasharray="158 880" stroke-dashoffset="-528" opacity="0.6"></circle>
      <!-- 업무 관리 12% -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="40" stroke-dasharray="106 880" stroke-dashoffset="-686" opacity="0.6"></circle>
      <!-- 피드백 10% (포인트) -->
      <circle cx="200" cy="200" r="140" fill="none" stroke="#ff6b4a" stroke-width="40" stroke-dasharray="88 880" stroke-dashoffset="-792" opacity="0.5"></circle>
      
      <!-- 중앙 텍스트 -->
      <text x="200" y="190" text-anchor="middle" fill="#ffffff" font-size="48" font-weight="700" transform="rotate(90 200 200)">60%</text>
      <text x="200" y="220" text-anchor="middle" fill="#ff6b4a" font-size="20" font-weight="500" transform="rotate(90 200 200)">간접 업무</text>
    </svg>

    <!-- 라벨들 (절대 배치) -->
    <div style="position:absolute; left:8%; top:25%; font-size:0.9vw; color:rgba(255,255,255,0.7);">
      <div style="font-weight:600; color:#fff; margin-bottom:0.2vw;">01. 문서 작성</div>
      <div style="font-size:1.4vw; font-weight:700; color:#fff;">15%</div>
    </div>
    
    <div style="position:absolute; right:8%; top:18%; font-size:0.9vw; color:rgba(255,255,255,0.7);">
      <div style="font-weight:600; color:#ff6b4a; margin-bottom:0.2vw;">02. 테스트</div>
      <div style="font-size:1.4vw; font-weight:700; color:#ff6b4a;">25%</div>
    </div>
    
    <div style="position:absolute; right:6%; bottom:32%; font-size:0.9vw; color:rgba(255,255,255,0.7);">
      <div style="font-weight:600; color:#ff6b4a; margin-bottom:0.2vw;">03. 데이터 작업</div>
      <div style="font-size:1.4vw; font-weight:700; color:#ff6b4a;">20%</div>
    </div>
    
    <div style="position:absolute; right:10%; bottom:18%; font-size:0.9vw; color:rgba(255,255,255,0.7);">
      <div style="font-weight:600; color:#fff; margin-bottom:0.2vw;">04. 회의</div>
      <div style="font-size:1.4vw; font-weight:700; color:#fff;">18%</div>
    </div>
    
    <div style="position:absolute; left:10%; bottom:18%; font-size:0.9vw; color:rgba(255,255,255,0.7);">
      <div style="font-weight:600; color:#fff; margin-bottom:0.2vw;">05. 업무 관리</div>
      <div style="font-size:1.4vw; font-weight:700; color:#fff;">12%</div>
    </div>
    
    <div style="position:absolute; left:8%; bottom:32%; font-size:0.9vw; color:rgba(255,255,255,0.7);">
      <div style="font-weight:600; color:#ff6b4a; margin-bottom:0.2vw;">06. 피드백</div>
      <div style="font-size:1.4vw; font-weight:700; color:#ff6b4a;">10%</div>
    </div>

    <!-- 포인트 도트들 -->
    <div style="position:absolute; right:25%; top:22%; width:0.6vw; height:0.6vw; border-radius:50%; background:#ff6b4a; box-shadow:0 0 1.2vw #ff6b4a;"></div>
    <div style="position:absolute; right:20%; bottom:36%; width:0.6vw; height:0.6vw; border-radius:50%; background:#ff6b4a; box-shadow:0 0 1.2vw #ff6b4a;"></div>
    <div style="position:absolute; left:20%; bottom:36%; width:0.6vw; height:0.6vw; border-radius:50%; background:#ff6b4a; box-shadow:0 0 1.2vw #ff6b4a;"></div>
  </div>
</div>
<p class="body-lg" style="max-width:100%; text-align:center; margin: 1.6vw auto 0; font-size:1.3vw; line-height:1.6;">
  고객이 실제로 경험하는 것에<br>
  <span style="color:#ff6b4a; font-weight:700;">더 많은 시간</span>을 할애해야 하지 않을까?
</p>
<div class="page-number" id="page-number"></div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>

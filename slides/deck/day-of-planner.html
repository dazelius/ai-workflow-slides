      <div class="bubble-node" style="left:70%; top:88%; width:6vw; height:6vw; --d:0.14s;">시뮬레이션 돌리기</div>

    </div>

    <div class="bubble-cell bubble-cell--test">
      <div class="bubble-cell-label">03</div>
      <div class="bubble-hub">테스트</div>

      <div class="bubble-cell-label">04</div>
      <div class="bubble-hub">회의</div>
      <div class="bubble-node" style="left:50%; top:10%; width:5.6vw; height:5.6vw; --d:0.00s;">안건 사전 정리</div>
      <div class="bubble-node" style="left:90%; top:42%; width:5.4vw; height:5.4vw; --d:0.07s;">회의록 작성</div>

      <div class="bubble-cell-label">05</div>
      <div class="bubble-hub">업무<br>관리</div>
      <div class="bubble-node" style="left:50%; top:10%; width:4.8vw; height:4.8vw; --d:0.00s;">일정 조율</div>
      <div class="bubble-node" style="left:90%; top:42%; width:5.8vw; height:5.8vw; --d:0.07s;">우선순위 재조정</div>

    </div>

    <div class="bubble-cell bubble-cell--fb">
      <div class="bubble-cell-label">06</div>
      <div class="bubble-hub">피드백</div>

      <div class="bubble-node" style="left:70%; top:88%; width:5.6vw; height:5.6vw; --d:0.14s;">반대 의견 대응</div>
      <div class="bubble-node" style="left:13%; top:70%; width:5.2vw; height:5.2vw; --d:0.21s;">이해관계자 소통</div>

  </div>

  <div class="page-number" id="page-number">14 / 44</div>
</div>
  <script>
    (function () {
      var stage = document.getElementById("bubbleStage");
      if (!stage) return;
      stage.addEventListener("click", function (e) {
        var hub = e.target.closest(".bubble-hub");
        if (!hub) return;
        var cell = hub.closest(".bubble-cell");
        if (cell) cell.classList.toggle("is-open");
      });
    })();
  </script>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>

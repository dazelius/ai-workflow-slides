<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>유니티</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker">피드백 루프</div>
<p class="title-lg">유니티는 <span class="accent">YAML</span>로 되어있음</p>

<div class="center-stage">
  <div class="col" style="gap: 2vw; align-items: flex-start;">
    <div class="body-lg" style="max-width: 50vw;">
      유니티 엔진의 씬(.scene)과 프리팹(.prefab) 파일은<br>
      텍스트 기반 YAML 포맷으로 저장됩니다.
    </div>

    <div class="card-grid" style="grid-template-columns: repeat(3, 1fr); margin-top: 1vw;">
      <div class="card marked">
        <div class="card-num">01</div>
        <div class="card-title">AI가 읽기 좋음</div>
        <div class="card-desc">
          구조화된 텍스트 포맷이라<br>
          LLM이 파싱하고 분석하기<br>
          최적의 형태
        </div>
      </div>

      <div class="card marked">
        <div class="card-num">02</div>
        <div class="card-title">데이터 추출 가능</div>
        <div class="card-desc">
          레벨 배치, 오브젝트 설정,<br>
          컴포넌트 파라미터 등<br>
          모든 정보 접근 가능
        </div>
      </div>

      <div class="card marked">
        <div class="card-num">03</div>
        <div class="card-title">웹으로 공유</div>
        <div class="card-desc">
          엔진 밖에서도<br>
          레벨 데이터를 시각화하고<br>
          팀과 공유 가능
        </div>
      </div>
    </div>

    <div class="body-lg" style="margin-top: 2vw; padding: 1.5vw 2vw; background: rgba(255,107,74,0.1); border-left: 0.3vw solid #ff6b4a; border-radius: 0.4vw;">
      → 엔진 내 게임 데이터를 프로그래밍 없이 추출·분석·시각화하는<br>
      &nbsp;&nbsp;&nbsp;자동화 파이프라인 구축이 가능합니다
    </div>
  </div>
</div>

<div class="page-number" id="page-number"></div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>

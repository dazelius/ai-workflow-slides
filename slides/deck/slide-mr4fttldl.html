<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>새 슬라이드</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker">피드백 루프</div>
<p class="title-lg">슈터 게임에서의 <span class="accent">레벨 피드백</span></p>

<div class="center-stage">
  <div class="col" style="gap:2.5vw; max-width:85%;">
    
    <div class="quote-list">
      <div class="quote-card" style="background:rgba(255,107,74,0.08); border-left:0.2vw solid #ff6b4a;">
        <div style="font-size:1.1vw; line-height:1.6; color:#e0e0e0;">
          "길이 좁은 것 같아요"<br>
          "사각지대가 너무 많아요"<br>
          "어디서 총 맞는지 모르겠어요"
        </div>
      </div>
    </div>

    <div class="body-lg" style="text-align:center; color:#b0b0b0; margin-top:0.5vw;">
      → 이런 피드백은 제대로 <span class="hl-box">닿지 않습니다</span>
    </div>

    <div class="row" style="align-items:center; justify-content:center; margin-top:1.5vw;">
      <div style="flex:1; height:0.1vw; background:rgba(255,107,74,0.3);"></div>
      <div style="padding:0 1.5vw; font-size:0.95vw; color:#ff6b4a; font-weight:600;">필요한 것</div>
      <div style="flex:1; height:0.1vw; background:rgba(255,107,74,0.3);"></div>
    </div>

    <div class="card-grid" style="grid-template-columns:repeat(2,1fr); margin-top:1vw;">
      <div class="card">
        <div class="card-title" style="color:#ff6b4a;">지점 메타정보</div>
        <div class="card-desc">
          "어느 위치에서" 경험했는지<br>
          좌표와 맥락
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="color:#ff6b4a;">방향 메타정보</div>
        <div class="card-desc">
          "어느 방향을 보며" 경험했는지<br>
          시선과 상황
        </div>
      </div>
    </div>

    <div class="body-lg" style="text-align:center; margin-top:1.5vw; font-size:1vw; color:#e0e0e0;">
      플레이어가 <span class="accent">어떤 지점</span>에서 <span class="accent">어떤 방향</span>을 보며<br>
      무엇을 경험했는지 — 구체적인 데이터가 있어야 피드백이 실행 가능해집니다
    </div>

  </div>
</div>

<div class="page-number" id="page-number"></div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>

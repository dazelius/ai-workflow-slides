<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>새 슬라이드</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker">데이터 입력</div>
<p class="title-lg">기존 배치 방식의 <span class="accent">한계</span></p>

<div class="center-stage">
  <div class="row" style="gap: 2vw; align-items: stretch;">
    
    <!-- 기존 방식 -->
    <div class="col" style="flex: 1; gap: 1vw;">
      <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.4vw; padding: 1.5vw; height: 100%;">
        <div style="font-size: 1.3vw; font-weight: 700; color: #ff6b4a; margin-bottom: 1vw;">기존 방식</div><div style="background: rgba(0,0,0,0.3); border-radius: 0.3vw; padding: 1vw; margin-bottom: 1.2vw; text-align: center;">
          <div style="font-size: 0.9vw; color: rgba(242,243,245,0.6);">Unity 에디터</div>
        </div>

        <ul class="check-list" style="font-size: 0.95vw; line-height: 1.6;">
          <li>Unity 환경에서 몬스터 프리펩을 드래그 앤 드롭</li>
          <li>인스펙터에서 컴포넌트 값을 일일이 수작업 조정</li>
          <li>완료 후 JSON으로 수동 저장</li>
        </ul>

        <div style="margin-top: 1.2vw; padding: 0.8vw; background: rgba(255,107,74,0.1); border-left: 3px solid #ff6b4a; border-radius: 0.3vw;">
          <div style="font-size: 0.85vw; color: rgba(242,243,245,0.7);">
            ⚠️ 반복 작업이 많고 실수 가능성 높음
          </div>
        </div>
      </div>
    </div>

    <!-- 개선 아이디어 -->
    <div class="col" style="flex: 1; gap: 1vw;">
      <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,107,74,0.3); border-radius: 0.4vw; padding: 1.5vw; height: 100%;">
        <div style="font-size: 1.3vw; font-weight: 700; color: #66d9ef; margin-bottom: 1vw;">개선 아이디어</div><div style="background: rgba(255,107,74,0.1); border-radius: 0.3vw; padding: 1vw; margin-bottom: 1.2vw; text-align: center;">
          <div style="font-size: 0.9vw; color: rgba(242,243,245,0.8);">커스텀 배치 툴</div>
        </div>

        <div class="col" style="gap: 0.8vw;">
          <div style="padding: 0.8vw; background: rgba(102,217,239,0.05); border-radius: 0.3vw;">
            <div style="font-size: 0.95vw; font-weight: 600; margin-bottom: 0.3vw;">2D 좌표계 활용</div>
            <div style="font-size: 0.85vw; color: rgba(242,243,245,0.7); line-height: 1.5;">
              3D 게임이지만 평면 배치라<br>더 컴팩트한 전용 툴 제작 가능
            </div>
          </div>

          <div style="padding: 0.8vw; background: rgba(102,217,239,0.05); border-radius: 0.3vw;">
            <div style="font-size: 0.95vw; font-weight: 600; margin-bottom: 0.3vw;">자동 데이터 입력</div>
            <div style="font-size: 0.85vw; color: rgba(242,243,245,0.7); line-height: 1.5;">
              배치하는 순간 관련 컴포넌트 값이<br>의도대로 자동 설정
            </div>
          </div>

          <div style="padding: 0.8vw; background: rgba(102,217,239,0.05); border-radius: 0.3vw;">
            <div style="font-size: 0.95vw; font-weight: 600; margin-bottom: 0.3vw;">작업 효율 향상</div>
            <div style="font-size: 0.85vw; color: rgba(242,243,245,0.7); line-height: 1.5;">
              반복 작업 제거 + 휴먼 에러 최소화
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="page-number" id="page-number"></div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>

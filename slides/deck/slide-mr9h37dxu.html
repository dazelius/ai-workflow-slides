<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<title>모든 것은 글에서 시작한다</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide"><div class="kicker">구조</div>
<p class="title-lg">모든 것은 글에서 시작한다</p>
<div class="center-stage">
  <div class="col" style="gap:0.9vw; width:100%;">
    <div class="framework-step">
      <div class="step-num">1</div>
      <div class="step-body">
        <p class="step-title">순수하게 글만 있을 경우</p>
        <p class="step-desc">소설</p>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">2</div>
      <div class="step-body">
        <p class="step-title">화자와 글을 나열할 경우</p>
        <p class="step-desc">대본</p>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">3</div>
      <div class="step-body">
        <p class="step-title">위의 대본에 일러스트가 붙으면</p>
        <p class="step-desc">비주얼노벨</p>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">4</div>
      <div class="step-body">
        <p class="step-title">이미지에 말풍선이 붙으면</p>
        <p class="step-desc">웹툰</p>
      </div>
    </div>
    <div class="framework-step">
      <div class="step-num">5</div>
      <div class="step-body">
        <p class="step-title">그 이미지가 움직이면?</p>
        <p class="step-desc"><span class="hl-box">애니메이션</span></p>
      </div>
    </div>
  </div>
</div>
<div class="page-number" id="page-number"></div></div>
  <script src="../assets/page-number.js"></script>
  <script src="../assets/editor.js"></script>


</body></html>
